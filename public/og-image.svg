<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="210" cy="140" r="210" fill="#6366f1" opacity="0.18"/>
  <circle cx="1040" cy="520" r="260" fill="#22c55e" opacity="0.14"/>

  <g filter="url(#shadow)">
    <rect x="70" y="80" width="1060" height="470" rx="34" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
  </g>

  <rect x="110" y="130" width="140" height="10" rx="5" fill="url(#accent)"/>

  <text x="110" y="210" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="54" fill="#ffffff" font-weight="700">
    Willerby Pinehurst Lodge (2020)
  </text>
  <text x="110" y="270" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="30" fill="#e2e8f0" font-weight="600">
    Castle View " Pendine Sands " Sea views
  </text>

  <text x="110" y="340" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="26" fill="#cbd5e1">
    Private sale (for sale by owner) " Never been let (family use only)
  </text>

  <g>
    <rect x="110" y="395" width="300" height="70" rx="18" fill="#ffffff"/>
    <text x="140" y="442" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="34" fill="#0f172a" font-weight="800">
      £84,995 O.N.O.
    </text>
  </g>

  <text x="110" y="520" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="22" fill="#94a3b8">
    pendinecaravan.com
  </text>
</svg>

